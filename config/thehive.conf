# TheHive Configuration File
# This configuration file contains all the necessary settings for TheHive

# HTTP server
http.baseUrl = "http://localhost:9000"
http.port = 9000

# Cassandra
cassandra {
  # Cassandra nodes addresses
  addresses = ["cassandra"]
  port = 9042
  keyspace = "thehive"
  username = ""
  password = ""
}

# Elasticsearch
elasticsearch {
  host = "elasticsearch"
  port = 9200
  index.nbShards = 5
  index.nbReplicas = 1
}

# Attachment storage
attachment {
  provider = "s3"
  s3 {
    endpoint = "http://minio:9000"
    region = "us-east-1"
    bucketName = "thehive-attachments"
    accessKeyId = "minioadmin"
    secretAccessKey = "minioadmin"
  }
}

# Authentication
auth {
  provider = ["local"]
  session {
    inactivity = 24h
  }
}

# Case templates
caseTemplate = "/data/case-templates"
