# Cortex Configuration File
# Threat Intelligence Engine Configuration

# HTTP server
http.port = 9001
http.baseUrl = "http://localhost:9001"

# Database
database {
  driver = "org.postgresql.Driver"
  url = "jdbc:postgresql://cortex-db:5432/cortex"
  user = "cortex"
  password = "CortexPassword123!"
  showSql = false
}

# JOB Settings
job {
  runner = ["docker"]
  timeout = 30 minutes
}

# Analyzer Configuration
analyzer {
  # Supported analyzers
  enabled = [
    "File_Info_Details",
    "File_Type_Magic",
    "MaxMind_GeoIP",
    "VirusTotal",
    "Shodan",
    "URLhaus",
    "PhishTank"
  ]
}

# Responder Configuration
responder {
  enabled = []
}

# Analyzer job settings
analyzer-docker {
  # Path to docker executable
  docker-path = "/usr/bin/docker"
  # Connection to docker daemon
  docker-uri = "unix:///var/run/docker.sock"
  # Image to use (optional)
  image = "thehiveproject/cortex-analyzers:latest"
  # Remove docker container once job is done
  remove-container = true
}

# Cache
cache {
  job = 10 minutes
}

# API
auth.key.header = "Authorization"
auth.key.format = "Bearer %s"
